<p-dialog
  header="Create Account"
  [modal]="true"
  [style]="{ width: '30rem' }"
  [visible]="visible()"
  (onHide)="onClose()"
>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <!-- First Name -->
    <div class="pt-4">
        <p-floatlabel variant="on" class="w-full p-2" >
            <input pInputText type="text" formControlName="firstName" class="w-full field-box" [class.p-filled]="registerForm.get('firstName')?.value"/>
            <label>First Name</label>
        </p-floatlabel>
    </div>
    

    <!-- Last Name -->
    <p-floatlabel variant="on" class="w-full p-2">
        <input pInputText type="text" formControlName="lastName" class="w-full field-box" [class.p-filled]="registerForm.get('lastName')?.value"/>
        <label>Last Name</label>
    </p-floatlabel>


    <!-- Email -->
    <p-floatlabel variant="on" class="w-full p-2">
        <input pInputText type="text" formControlName="email" class="w-full field-box" [class.p-filled]="registerForm.get('email')?.value"/>
        <label>Email</label>
    </p-floatlabel>

    <!-- Phone Number -->
    <p-floatlabel variant="on" class="w-full p-2">
        <p-inputMask name="phonenumber" inputId="phone" formControlName="phone" 
                    mask="999-999-9999" styleClass="w-full max-w-md"> </p-inputMask>
        <label for="phone">Phone Number</label>
    </p-floatlabel>


    <!-- Password -->
    <p-floatlabel variant="on" class="w-full p-2">
        <input pInputText type="password" formControlName="password" class="w-full field-box" [class.p-filled]="registerForm.get('password')?.value"/>
        <label>Password</label>
    </p-floatlabel>
    

    <!-- Confirm Password -->
    <p-floatlabel variant="on" class="w-full p-2">
        <input pInputText type="password" formControlName="confirmPassword" class="w-full field-box" [class.p-filled]="registerForm.get('confirmPassword')?.value"/>
        <label>Confirm Password</label>
    </p-floatlabel>
    <!-- <p>Form valid: {{ registerForm.valid }}</p>
    <p>Form value: {{ registerForm.value | json }}</p> -->

    @if (
      registerForm.hasError('passwordMismatch') &&
      registerForm.get('confirmPassword')?.touched
    ) {
      <div class="text-red-500 text-sm px-2">
        Passwords do not match
      </div>
    }
    
    <!-- Buttons -->
    <div class="flex justify-center gap-3 mt-4 w-full">

      <p-button
        label="Cancel"
        severity="secondary"
        type="button"
        (onClick)="cancelled.emit()"
      />

      <p-button
        label="Register"
        type="submit"
        [disabled]="registerForm.invalid"
      />

    </div>

  </form>

</p-dialog>
