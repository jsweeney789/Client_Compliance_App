<div class="row">
  <!-- Row for search bar and add button-->
  <div></div>

</div>

<div class="board">

  

  @for (column of columns; track $index) {
    
      <app-case-column
        [title]="column.name"
        [cases]="column.cases"
        [clientMap]="clientMap"
        [columnIndex]="$index"
        [totalColumns]="columns.length"
        (moveLeft)="onMoveLeft($event)"
        (moveRight)="onMoveRight($event)"
        (viewDetails)="openCase($event)">
      </app-case-column>
    
  }
</div>
<app-detail-modal
  [(visible)]="showDialog"
  [client]="selectedClient">
</app-detail-modal>
