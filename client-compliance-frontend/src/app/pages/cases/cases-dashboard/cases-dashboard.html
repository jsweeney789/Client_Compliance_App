
<div class="case-toolbar">

  <!-- SEARCH (takes most of the space) -->
  <span class="p-input-icon-left search-box">
    <i class="pi pi-search"></i>

    <input
      pInputText
      type="text"
      placeholder="Search cases..."
      [(ngModel)]="searchTerm"
      (input)="onSearchChange()"
    />
  </span>

  <!-- DATE PICKER -->
  <p-datepicker
    [(ngModel)]="dateRange"
    selectionMode="range"
    [showIcon]="true"
    inputId="caseDateFilter"
    [showOnFocus]="false"
    placeholder="Filter by date"
  ></p-datepicker>


  <!-- ACTION BUTTON -->
  <p-button
    label="Add Case"
    icon="pi pi-plus"
    styleClass="p-button-primary"
    (onClick)="openInitializeCaseModal()"
  ></p-button>

</div>

<div class="board">

  

  @for (column of filteredColumns; track column.id) {
    
      <app-case-column
        [title]="column.name"
        [cases]="column.cases"
        [clientMap]="clientMap"
        [columnIndex]="$index"
        [totalColumns]="columns.length"
        (moveLeft)="onMoveLeft($event)"
        (moveRight)="onMoveRight($event)"
        (viewDetails)="openCase($event)">
      </app-case-column>
    
  }
</div>
<app-detail-modal
  [(visible)]="showDetailDialog"
  [client]="selectedClient">
</app-detail-modal>

<app-initialize-case-modal
  [(visible)]="showInitializeDialog"
  [clients]="clientsArray"
  >
</app-initialize-case-modal>
