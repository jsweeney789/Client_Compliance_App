<div class="card max-w-2xl mx-auto p-4">

  <h1 class="mb-4 text-center text-3xl"><b>Add Client</b></h1>

  <form #clientForm="ngForm" class="flex flex-col gap-4">

    
    <div class="flex flex-col gap-1">
      <label>First Name</label>
      <input
        pInputText
        name="firstName"
        required
        [(ngModel)]="newClient.firstName"
        class="w-full"
      />
    </div>

    
    <div class="flex flex-col gap-1">
      <label>Last Name</label>
      <input
        pInputText
        name="lastName"
        required
        [(ngModel)]="newClient.lastName"
        class="w-full"
      />
    </div>

   
    <div class="flex flex-col gap-1">
      <label>Email</label>
      <input
        pInputText
        name="email"
        required
        email
        [(ngModel)]="newClient.email"
        class="w-full"
      />
    </div>

  
    <div class="flex flex-col gap-1">
  <label>Phone</label>
  <p-inputMask
    name="phoneNumber"
    mask="999-999-9999"
    required
    [(ngModel)]="newClient.phoneNumber"
    styleClass="w-full"
  ></p-inputMask>
</div>

   
    <div class="flex flex-col gap-1">
      <label>Sector</label>
      <p-select
        name="sector"
        required
        [options]="sectors"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="newClient.sector"
        class="w-full"
      ></p-select>
    </div>

   
    <div class="flex flex-col gap-1">
      <label>Domicile</label>
      <p-select
        name="domicile"
        required
        [options]="domiciles"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="newClient.domicile"
        class="w-full"
      ></p-select>
    </div>

    
    <div class="flex flex-col gap-1">
      <label>Client Type</label>
      <p-select
        name="type"
        required
        [options]="clienttypes"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="newClient.type"
        class="w-full"
      ></p-select>
    </div>

    
    <div class="flex justify-end gap-2 mt-4">
      <p-button
        type="button"
        label="Reset"
        severity="secondary"
        (click)="resetClient()"
      ></p-button>

      <p-button
        type="button"
        label="Save"
        icon="pi pi-check"
        (click)="createClient()"
        [disabled]="clientForm.invalid"
      ></p-button>
    </div>

  </form>
</div>
