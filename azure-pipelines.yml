trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - backend/**
      - frontend/**
      - k8s/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

variables:
  - name: acrLoginServer
    value: 'bkjsacr.azurecr.io'              # UPDATE: your ACR login server (e.g. myacr.azurecr.io)
  - name: backendImage
    value: 'backend'               # UPDATE: image name for the backend (e.g. engagement-api)
  - name: frontendImage
    value: 'frontend'              # UPDATE: image name for the frontend (e.g. engagement-frontend)
  - group: client-compliance-env              # UPDATE: must match the variable group name in ADO Library

stages:

  # ─────────────────────────────────────────────────────────────
  # STAGE 1 — Lint & Test
  # ─────────────────────────────────────────────────────────────
  - stage: LintAndTest
    displayName: 'Lint & Test'
    jobs:
      - job: BackendQuality
        displayName: 'Backend: Lint + Unit Tests'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: |
              cd backend && npm install
            displayName: 'Install backend dependencies'

          - script: |
              cd backend && npm run lint
            displayName: 'ESLint'

          - script: |
              cd backend && npm test -- --ci
            displayName: 'Run unit tests'

  # ─────────────────────────────────────────────────────────────
  # STAGE 2 — Build & Push Docker Images to ACR
  # ─────────────────────────────────────────────────────────────
  - stage: BuildAndPush
    displayName: 'Build & Push Images to ACR'
    dependsOn: LintAndTest
    condition: succeeded()
    jobs:
      - job: BuildBackend
        displayName: 'Build backend image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build & push backend image'
            inputs:
              containerRegistry: 'ACR-Service-Connection'  # UPDATE: name of your ACR service connection in ADO
              repository: '$(backendImage)'
              command: 'buildAndPush'
              Dockerfile: 'backend/Dockerfile'
              buildContext: 'backend'
              tags: |
                $(Build.BuildId)
                latest

      - job: BuildFrontend
        displayName: 'Build frontend image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build & push frontend image'
            inputs:
              containerRegistry: 'ACR-Service-Connection'  # UPDATE: name of your ACR service connection in ADO
              repository: '$(frontendImage)'
              command: 'buildAndPush'
              Dockerfile: 'frontend/Dockerfile'
              buildContext: 'frontend'
              buildArguments: |
                VITE_API_URL=$(VITE_API_URL_STAGING)
              tags: |
                $(Build.BuildId)
                latest

